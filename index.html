<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukma & Reni Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Poppins',sans-serif;
    background:transparent;
    color:#fff;
    text-align:center;
    overflow-x:hidden;
  }
  
  .wrapper{
    min-height:100vh;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
  }
  
  h1,h2{font-family:'Playfair Display',serif;font-weight:700}
  
  .names{
    font-size:3.2rem;
    color:#d4af37;
    margin:20px 0;
    line-height:1.2;
  }
  
  .subtitle{
    font-size:1rem;
    letter-spacing:3px;
    color:#ddd;
    margin-bottom:30px;
  }
  
  .date{
    font-size:1.4rem;
    color:#fff;
    margin:20px 0;
  }
  
  .couple-photo{
    width:220px;
    height:220px;
    border-radius:50%;
    border:4px solid #d4af37;
    object-fit:cover;
    margin:30px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
  }
  
  .countdown{
    display:flex;
    gap:15px;
    margin:40px 0;
    flex-wrap:wrap;
    justify-content:center;
  }
  .countdown div{
    background:rgba(255,255,255,0.08);
    padding:15px 20px;
    border-radius:10px;
    min-width:80px;
    border:1px solid #d4af37;
    backdrop-filter:blur(10px);
  }
  .countdown span{
    font-size:2rem;
    font-weight:700;
    color:#d4af37;
    display:block;
  }
  .countdown small{
    font-size:0.8rem;
    color:#ddd;
  }
  
  .location{
    margin:30px 0;
    font-size:1rem;
    color:#ddd;
  }
  
  .btn{
    display:inline-block;
    padding:12px 32px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:50px;
    margin-top:20px;
    font-weight:500;
    transition:0.3s;
  }
  .btn:hover{
    background:#b8941f;
    transform:translateY(-2px);
  }
  
  .bottom-icon{
    margin-top:60px;
  }
  
  @media(max-width:600px){
    .names{font-size:2.4rem}
    .couple-photo{width:180px;height:180px}
  }
</style>
</head>
<body>

<div class="wrapper">
  <p class="subtitle" data-aos="fade-down">THE WEDDING OF</p>
  
  <h1 class="names" data-aos="fade-up">Sukma & Reni</h1>
  
  <p class="date" data-aos="fade-up" data-aos-delay="200">16 Oktober 2025</p>
  
  <!-- Ganti link foto ini -->
  <img src="https://i.postimg.cc/qqvtrBt8/foto2.jpg" alt="Couple" class="couple-photo" data-aos="zoom-in" data-aos-delay="300">
  
  <div class="countdown" id="countdown" data-aos="fade-up" data-aos-delay="400">
    <div><span id="days">00</span><small>Hari</small></div>
    <div><span id="hours">00</span><small>Jam</small></div>
    <div><span id="minutes">00</span><small>Menit</small></div>
    <div><span id="seconds">00</span><small>Detik</small></div>
  </div>
  
  <p class="location" data-aos="fade-up" data-aos-delay="500">
    Gedung Serbaguna Bahagia<br>
    Jakarta Selatan
  </p>
  
  <a href="https://maps.app.goo.gl/QcNb4prT5vgMrdNX6" target="_blank" class="btn" data-aos="fade-up" data-aos-delay="600">Buka Lokasi</a>
  
  <!-- Icon SVG transparan di bawah -->
  <div class="bottom-icon" data-aos="fade-up" data-aos-delay="700">
    <svg width="140" height="90" viewBox="0 0 140 90" xmlns="http://www.w3.org/2000/svg">
      <circle cx="70" cy="40" r="35" stroke="#d4af37" stroke-width="3" fill="none"/>
      <g fill="#d4af37">
        <circle cx="58" cy="35" r="8"/>
        <circle cx="82" cy="35" r="8"/>
        <path d="M58 45 Q58 55 70 55 Q82 55 82 45" stroke="#d4af37" stroke-width="2" fill="none"/>
      </g>
      <text x="70" y="70" text-anchor="middle" fill="#d4af37" font-family="Poppins" font-size="11" font-weight="500">
        Sukma & Reni
      </text>
    </svg>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration:1200, once:true, easing:'ease-out-cubic'});

const weddingDate = new Date('2025-10-16T09:00:00');

function updateCountdown(){
  const now = new Date().getTime();
  const distance = weddingDate.getTime() - now;
  
  if(distance < 0){
    document.getElementById('countdown').innerHTML = "<h3 style='color:#d4af37'>Acara Sedang Berlangsung</h3>";
    return;
  }
  
  document.getElementById('days').innerText = String(Math.floor(distance/(1000*60*60*24))).padStart(2,'0');
  document.getElementById('hours').innerText = String(Math.floor((distance%(1000*60*60*24))/(1000*60*60))).padStart(2,'0');
  document.getElementById('minutes').innerText = String(Math.floor((distance%(1000*60*60))/(1000*60))).padStart(2,'0');
  document.getElementById('seconds').innerText = String(Math.floor((distance%60000)/1000)).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown,1000);
</script>
</body>
  </html>
