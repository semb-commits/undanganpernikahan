<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukma & Reni Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    height:100%;
    font-family:'Poppins',sans-serif;
    background:transparent; /* PENTING: transparan */
    color:#fff;
    scroll-behavior:smooth;
  }
  
  section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
    text-align:center;
    background:transparent; /* PENTING: transparan */
  }
  
  h1,h2,h3{font-family:'Playfair Display',serif;font-weight:700}
  
  .hero h2{
    font-size:0.9rem;
    letter-spacing:4px;
    color:#aaa;
    margin-bottom:20px;
  }
  .hero h1{
    font-size:3.5rem;
    color:#d4af37;
    line-height:1.2;
  }
  .hero p{
    font-size:1.1rem;
    color:#ddd;
    margin:20px 0 40px;
  }
  
  .countdown{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin:30px 0;
  }
  .countdown div{
    background:rgba(255,255,255,0.08);
    padding:15px 18px;
    border-radius:10px;
    border:1px solid #d4af37;
    min-width:75px;
    backdrop-filter:blur(8px);
  }
  .countdown span{
    font-size:1.8rem;
    font-weight:700;
    color:#d4af37;
    display:block;
  }
  .countdown small{
    font-size:0.75rem;
    color:#aaa;
  }
  
  .btn{
    display:inline-block;
    padding:12px 35px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:50px;
    font-weight:500;
    margin-top:20px;
    transition:0.3s;
  }
  
  .section-title{
    font-size:2.2rem;
    color:#d4af37;
    margin-bottom:15px;
  }
  
  .couple-photo{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #d4af37;
    margin:20px 0;
  }
  
  .gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    max-width:500px;
    margin:30px 0;
  }
  .gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid #d4af37;
  }
  
  /* Icon di paling bawah */
  .bottom-icon{
    margin-top:auto;
    padding-top:60px;
    padding-bottom:40px;
  }
  
  @media(max-width:600px){
    .hero h1{font-size:2.6rem}
    .gallery{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<section class="hero">
  <h2 data-aos="fade-down">THE WEDDING OF</h2>
  <h1 data-aos="fade-up">Sukma & Reni</h1>
  <p data-aos="fade-up" data-aos-delay="200">16 Oktober 2026</p>
  
  <div class="countdown" id="countdown" data-aos="fade-up" data-aos-delay="300">
    <div><span id="days">00</span><small>Hari</small></div>
    <div><span id="hours">00</span><small>Jam</small></div>
    <div><span id="minutes">00</span><small>Menit</small></div>
    <div><span id="seconds">00</span><small>Detik</small></div>
  </div>
  
  <a href="#detail" class="btn" data-aos="zoom-in" data-aos-delay="400">Buka Undangan</a>
</section>

<section id="detail">
  <h2 class="section-title" data-aos="fade-up">Mempelai</h2>
  
  <img src="https://i.postimg.cc/qqvtrBt8/foto2.jpg" alt="Sukma" class="couple-photo" data-aos="zoom-in" data-aos-delay="200">
  <h3 style="color:#d4af37;font-size:1.8rem" data-aos="fade-up" data-aos-delay="300">Sukma Afriansyah</h3>
  
  <h3 style="color:#d4af37;margin:20px 0;font-size:2rem" data-aos="zoom-in">&</h3>
  
  <img src="https://i.postimg.cc/DyWZPM1X/foto3.jpg" alt="Reni" class="couple-photo" data-aos="zoom-in" data-aos-delay="400">
  <h3 style="color:#d4af37;font-size:1.8rem" data-aos="fade-up" data-aos-delay="500">Reni Kurniasari</h3>
  
  <!-- ICON TARO DI PALING BAWAH -->
  <div class="bottom-icon" data-aos="fade-up" data-aos-delay="600">
    <svg width="140" height="90" viewBox="0 0 140 90" xmlns="http://www.w3.org/2000/svg">
      <circle cx="70" cy="40" r="35" stroke="#d4af37" stroke-width="3" fill="none"/>
      <g fill="#d4af37">
        <circle cx="58" cy="35" r="8"/>
        <circle cx="82" cy="35" r="8"/>
        <path d="M58 45 Q58 55 70 55 Q82 55 82 45" stroke="#d4af37" stroke-width="2" fill="none"/>
      </g>
      <text x="70" y="70" text-anchor="middle" fill="#d4af37" font-family="Poppins" font-size="11" font-weight="500">
        Sukma & Reni
      </text>
    </svg>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration:1000, once:true});

const weddingDate = new Date('2026-10-16T09:00:00');

function updateCountdown(){
  const now = new Date().getTime();
  const distance = weddingDate.getTime() - now;
  
  if(distance < 0){
    document.getElementById('countdown').innerHTML = "<h3 style='color:#d4af37'>Acara Sedang Berlangsung</h3>";
    return;
  }
  
  document.getElementById('days').innerText = String(Math.floor(distance/(1000*60*60*24))).padStart(2,'0');
  document.getElementById('hours').innerText = String(Math.floor((distance%(1000*60*60*24))/(1000*60*60))).padStart(2,'0');
  document.getElementById('minutes').innerText = String(Math.floor((distance%(1000*60*60))/(1000*60))).padStart(2,'0');
  document.getElementById('seconds').innerText = String(Math.floor((distance%60000)/1000)).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown,1000);
</script>
</body>
   </html>
